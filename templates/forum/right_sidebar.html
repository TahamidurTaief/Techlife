{% load static %}

<div class="w-full lg:w-1/3 flex-shrink-0">
    <div class="bg-white rounded-lg mt-4 lg:mt-1 p-3 lg:sticky lg:top-4 max-h-screen lg:max-h-[90vh] overflow-y-auto scrollbar-hide">

        <h3 class="text-lg font-inter text-gray-700 font-semibold pb-3 border-b border-gray-100 mb-3">
            <span class="inline-block w-1 h-4 bg-blue-600 rounded mr-2 align-middle"></span> Recent Questions
        </h3>

        <ul class="flex flex-col gap-y-2">
            {% for question in right_side_questions|slice:"8" %}
            <a href="{% url 'questions' slug=question.slug %}" hx-get="{% url 'questions' slug=question.slug %}" hx-target="#blog_post_form" hx-swap="innerHTML" hx-push-url="true" class="block">
                <li class="flex items-center gap-x-3 p-2 rounded-lg hover:bg-gray-50 transition-colors duration-200 group cursor-pointer">

                    <!-- Thumbnail -->
                    <div class="w-20 h-16 flex-shrink-0 overflow-hidden rounded-md">
                        {% if question.image %}
                        <img src="{{ question.image.url }}" alt="{{ question.title }}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" /> {% else %}
                        <img src="{% static 'image/placeholder-5.png' %}" alt="{{ question.title }}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" /> {% endif %}
                    </div>

                    <!-- Text -->
                    <div class="flex flex-col gap-y-1 min-w-0">
                        <h4 class="text-[13px] font-semibold text-gray-800 group-hover:text-blue-600 line-clamp-2 leading-snug transition-colors duration-200">
                            {{ question.title }}
                        </h4>
                        <p class="text-xs text-gray-500 line-clamp-2">
                            {{ question.content|truncatewords:15|striptags }}
                        </p>
                    </div>

                </li>
                <hr class="border-gray-100" />
            </a>
            {% endfor %}
        </ul>

    </div>
</div>

<style>
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
</style>
