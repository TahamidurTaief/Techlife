{% load static %}

<!-- Blog Not Found Partial for HTMX -->
<div class="flex flex-col items-center justify-center min-h-[50vh] text-center px-4">
    <div class="tl-card rounded-2xl p-10 max-w-sm w-full mx-auto">
        <div class="w-14 h-14 bg-[#1e3a6e]/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e3a6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><line x1="12" x2="12" y1="6" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
        </div>
        <h1 class="text-[18px] font-bold text-gray-800 mb-2">Blog Not Found</h1>
        <p class="text-[13px] text-gray-500 mb-5">The blog post you're looking for doesn't exist or has been removed.</p>
        <a href="{% url 'homepage' %}"
            hx-get="{% url 'homepage' %}"
            hx-target="#container"
            hx-push-url="{% url 'homepage' %}"
            hx-swap="innerHTML"
            class="inline-flex items-center gap-2 px-5 py-2.5 bg-[#1e3a6e] text-white text-[13px] font-semibold rounded-xl hover:bg-[#152d56] transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Back to Home
        </a>
    </div>
</div>
