{% load custom_filters %}

<span id="like-toggle">
    {% if user_has_liked %}
    <a href="{% url 'user_like_toggle' like_slug=blog_detail.slug %}"
       hx-get="{% url 'user_like_toggle' like_slug=blog_detail.slug %}"
    hx-target="#container"
    hx-swap="innerHTML"
       data-no-scroll
    class="like-btn flex items-center gap-1.5 text-[#1e3a6e] cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="#1e3a6e" stroke="#1e3a6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></svg>
        <span>Liked</span>
    </a>
    {% else %}
        {% if request.user.is_verified %}
        <a href="{% url 'user_like_toggle' like_slug=blog_detail.slug %}"
           hx-get="{% url 'user_like_toggle' like_slug=blog_detail.slug %}"
              hx-target="#container"
              hx-swap="innerHTML"
           data-no-scroll
           class="like-btn flex items-center gap-1.5 text-gray-500 hover:text-[#1e3a6e] transition-colors cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></svg>
            <span>Like</span>
        </a>
        {% else %}
        <div class="relative group">
            <span class="flex items-center gap-1.5 text-gray-400 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></svg>
                <span>Like</span>
            </span>
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-[10px] rounded-lg px-3 py-1.5 shadow-lg opacity-0 group-hover:opacity-100 transition-opacity z-50 whitespace-nowrap">Please sign in first</div>
        </div>
        {% endif %}
    {% endif %}
</span>
{% if include_oob %}
<span id="like-count" hx-swap-oob="true">{{ blog_detail.likes.count|humanize_number }}</span>
{% endif %}
