{% load static %}
<div class="flex flex-col w-full lg:w-1/4 gap-4 border-t pt-4 lg:border-t-0 lg:border-l lg:pl-4 border-gray-300" data-aos="fade-up" data-aos-anchor-placement="top-bottom" data-aos-duration="500">

    <div class="sm:hidden py-2 text-center font-bold text-lg text-white bg-blue-500 rounded-sm" data-aos="fade-up" data-aos-anchor-placement="top-bottom" data-aos-duration="500">
        Popular
    </div>

    <ol class="list-none flex flex-col gap-3 justify-start items-start -mt-4" data-aos="fade-up" data-aos-anchor-placement="top-bottom" data-aos-duration="500">
        {% for post in latest_popular_blogs|slice:'3' %}
        <li class="flex items-start cursor-pointer group " data-aos="fade-up" data-aos-anchor-placement="top-bottom" data-aos-duration="500">
            <span class="text-xl font-bold text-blue-600 mr-2 flex-shrink-0">{{ forloop.counter }}</span>
            <div class="flex flex-col">
                <a href="{% url 'blog_details' post.slug %}" class="font-medium text-base leading-snug group-hover:text-blue-600 line-clamp-2">{{ post.title }}</a>
                <span class="text-xs text-gray-500">{{ post.category.name }}</span>
            </div>
        </li>
        {% endfor %}



    </ol>

    <!-- Ad 7 - popular list sidebar -->
    {% if ad_7 %}
    <div class="w-full flex justify-center items-center mt-5 mx-auto px-4 sm:px-0">
        {{ ad_7.ad_code|safe }}
    </div>
    {% endif %}

</div>
