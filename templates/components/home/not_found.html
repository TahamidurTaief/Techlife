{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center px-6">
    <div class="tl-card rounded-2xl p-10 max-w-md w-full mx-auto">
        <div class="w-16 h-16 bg-[#1e3a6e]/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <img src="{% static 'image/circle_error.png' %}" alt="Not Found" class="w-10 h-10">
        </div>
        <h1 class="text-4xl font-black text-[#1e3a6e] mb-2">Oops!</h1>
        <h2 class="text-xl font-bold text-gray-800 mb-3">Post Not Available</h2>
        <p class="text-[13px] text-gray-500 mb-1">The post you are looking for might have been removed or never existed.</p>
        <p class="text-[13px] text-gray-500 mb-6">You can check out other posts or return to the homepage.</p>
        <a href="/"
            class="inline-flex items-center gap-2 px-6 py-2.5 bg-[#1e3a6e] text-white text-[13px] font-semibold rounded-lg hover:bg-[#152d56] transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            Explore Other Posts
        </a>
    </div>
</div>
{% endblock content %}
