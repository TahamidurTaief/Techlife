{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center px-6">
    <div class="tl-card rounded-2xl p-10 max-w-md w-full mx-auto">
        <div class="w-16 h-16 bg-[#1e3a6e]/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <img src="{% static 'image/circle_error.png' %}" alt="404" class="w-10 h-10">
        </div>
        <h1 class="text-5xl font-black text-[#1e3a6e] mb-2">404</h1>
        <h2 class="text-xl font-bold text-gray-800 mb-3">Page Not Found</h2>
        <p class="text-[13px] text-gray-500 mb-1">We looked everywhere for this page.</p>
        <p class="text-[13px] text-gray-500 mb-2">Are you sure the website URL is correct?</p>
        <p class="text-[13px] text-gray-500 mb-6">Get in touch with the site owner.</p>
        <a href="/"
            class="inline-flex items-center gap-2 px-6 py-2.5 bg-[#1e3a6e] text-white text-[13px] font-semibold rounded-lg hover:bg-[#152d56] transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Return to Homepage
        </a>
    </div>
</div>
{% endblock content %}
