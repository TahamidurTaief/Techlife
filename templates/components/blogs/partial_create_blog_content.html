{% load static %}

<div class="max-w-3xl mx-auto px-3 py-8">
    <div class="tl-card rounded-2xl overflow-hidden">

        <!-- Header -->
        <div class="flex items-center gap-3 px-6 py-4 bg-[#1e3a6e]">
            <img src="{% static 'image/company_logo.webp' %}" alt="TechLife Logo" class="w-8 h-8 rounded-full object-cover" />
            <div>
                <h1 class="text-[15px] font-bold text-white">Create New Article</h1>
                <p class="text-[11px] text-white/70">Share your knowledge with the community</p>
            </div>
        </div>

        <form class="p-6 space-y-5"
            id="create-blog-form"
            method="POST"
            enctype="multipart/form-data"
            action="{% url 'create_blog' %}">
            {% csrf_token %}

            <!-- Category -->
            <div>
                <label for="category_select" class="block text-[11px] font-bold text-gray-500 uppercase tracking-wide mb-1.5">
                    Category <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                    <select id="category_select" name="category" required
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[13px] text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#1e3a6e] focus:border-[#1e3a6e] appearance-none transition-all">
                        <option value="" disabled selected>Select Category</option>
                        {% for category in categories %}
                        <option value="{{ category.pk }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
            </div>

            <!-- Subcategory -->
            <div>
                <label for="subcategory_select" class="block text-[11px] font-bold text-gray-500 uppercase tracking-wide mb-1.5">Sub-Category</label>
                <div class="relative">
                    <select id="subcategory_select" name="subcategory"
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[13px] text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#1e3a6e] focus:border-[#1e3a6e] appearance-none transition-all">
                        <option value="" disabled selected>Select Sub-Category</option>
                        {% for subcategory in subcategories %}
                        <option value="{{ subcategory.pk }}">{{ subcategory.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
            </div>

            <!-- Title -->
            <div>
                <label for="post_title" class="block text-[11px] font-bold text-gray-500 uppercase tracking-wide mb-1.5">
                    Post Title <span class="text-red-400">*</span>
                </label>
                <input type="text" name="title" id="post_title" required autocomplete="off"
                    placeholder="Enter a clear, descriptive title..."
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[13px] text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1e3a6e] focus:border-[#1e3a6e] transition-all" />
            </div>

            <!-- Description — CKEditor -->
            <div>
                <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wide mb-1.5">
                    Description <span class="text-red-400">*</span>
                </label>
                <!-- NOTE: NO 'required' — CKEditor hides textarea, browser validation fails -->
                <textarea name="description" id="post_description" rows="12"
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[13px] text-gray-800"></textarea>
                <p id="desc-error" class="hidden text-red-500 text-[11px] mt-1 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    Description is required.
                </p>
            </div>

            <!-- Featured Image Upload -->
            <div>
                <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wide mb-1.5">Featured Image</label>
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 hover:border-[#1e3a6e] transition-colors cursor-pointer" id="drop-zone">
                    <input type="file" name="featured_image" id="featured_image" accept="image/*"
                        class="w-full text-[12px] text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-[11px] file:font-semibold file:bg-[#1e3a6e] file:text-white hover:file:bg-[#152d56] file:cursor-pointer" />
                    <p class="text-[11px] text-gray-500 mt-1.5">PNG, JPG, WebP · Max 5MB</p>
                    <!-- Preview -->
                    <img id="image-preview" src="" alt="Preview" class="hidden mt-3 rounded-xl max-h-40 object-cover" />
                </div>
            </div>

            <!-- Featured Image URL -->
            <div>
                <label for="featured_image_url" class="block text-[11px] font-bold text-gray-500 uppercase tracking-wide mb-1.5">
                    Featured Image URL <span class="text-gray-400 font-normal normal-case">(optional)</span>
                </label>
                <input type="url" name="featured_image_url" id="featured_image_url"
                    placeholder="https://example.com/image.jpg"
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[13px] text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#1e3a6e] focus:border-[#1e3a6e] transition-all" />
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-3">
                    <i class="fa-solid fa-tags mr-1 text-[#1e3a6e]"></i> Tags
                </label>
                <div class="flex flex-wrap gap-2 max-h-52 overflow-y-auto border border-gray-200 rounded-xl p-3 bg-gray-50">
                    {% for checkbox in form.tags %}
                    <label class="flex items-center gap-1.5 cursor-pointer px-3 py-1.5 rounded-full border border-gray-200 bg-white hover:border-[#1e3a6e] hover:bg-blue-50 transition-all text-sm font-medium text-gray-700 has-checked:bg-[#1e3a6e] has-checked:text-white has-checked:border-[#1e3a6e]">
                        {{ checkbox.tag }}
                        <span>{{ checkbox.choice_label }}</span>
                    </label>
                    {% endfor %}
                </div>
                {% if form.tags.errors %}
                <p class="text-red-500 text-xs mt-1">{{ form.tags.errors }}</p>
                {% endif %}
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-2 border-t border-gray-100">
                <a href="{% url 'homepage' %}"
                    class="px-5 py-2.5 border border-gray-200 text-gray-600 text-[13px] font-semibold rounded-xl hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
                <button type="submit" id="create-submit-btn"
                    class="px-6 py-2.5 bg-[#1e3a6e] text-white text-[13px] font-bold rounded-xl hover:bg-[#152d56] transition-colors shadow-sm flex items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span id="submit-text">Publish Article</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Load CKEditor from Django's static -->
<script src="{% static 'ckeditor/ckeditor/ckeditor.js' %}"></script>

<script>
(function () {

    /* ── Image preview ──────────────────────────────────────────── */
    var imgInput   = document.getElementById('featured_image');
    var imgPreview = document.getElementById('image-preview');
    if (imgInput && imgPreview) {
        imgInput.addEventListener('change', function () {
            var file = this.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    imgPreview.src = e.target.result;
                    imgPreview.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });
    }

    /* ── CKEditor init ──────────────────────────────────────────── */
    function initEditor() {
        if (typeof CKEDITOR === 'undefined') {
            // retry once after 500ms in case script hasn't fully loaded
            setTimeout(initEditor, 500);
            return;
        }

        // Destroy previous instance if re-init (HTMX SPA navigation)
        if (CKEDITOR.instances['post_description']) {
            CKEDITOR.instances['post_description'].destroy(true);
        }

        CKEDITOR.replace('post_description', {
            toolbar: [
                { name: 'document',    items: ['Source', '-', 'Save', 'NewPage', 'Preview', 'Print'] },
                { name: 'clipboard',   items: ['Cut', 'Copy', 'Paste', 'PasteText', 'PasteFromWord', '-', 'Undo', 'Redo'] },
                { name: 'editing',     items: ['Find', 'Replace', '-', 'SelectAll'] },
                '/',
                { name: 'basicstyles', items: ['Bold', 'Italic', 'Underline', 'Strike', 'Subscript', 'Superscript', '-', 'CopyFormatting', 'RemoveFormat'] },
                { name: 'paragraph',   items: ['NumberedList', 'BulletedList', '-', 'Outdent', 'Indent', '-', 'Blockquote', 'CreateDiv', '-', 'JustifyLeft', 'JustifyCenter', 'JustifyRight', 'JustifyBlock', '-', 'BidiLtr', 'BidiRtl', 'Language'] },
                { name: 'links',       items: ['Link', 'Unlink', 'Anchor'] },
                { name: 'insert',      items: ['Image', 'Flash', 'Table', 'HorizontalRule', 'Smiley', 'SpecialChar', 'PageBreak', 'Iframe'] },
                '/',
                { name: 'styles',      items: ['Styles', 'Format', 'Font', 'FontSize'] },
                { name: 'colors',      items: ['TextColor', 'BGColor'] },
                { name: 'tools',       items: ['Maximize', 'ShowBlocks'] },
            ],
            height: 450,
            // File manager — django-ckeditor-uploader URLs
            filebrowserUploadUrl:      "{% url 'ckeditor_upload' %}",
            filebrowserBrowseUrl:      "{% url 'ckeditor_browse' %}",
            filebrowserImageUploadUrl: "{% url 'ckeditor_upload' %}?type=Images",
            filebrowserImageBrowseUrl: "{% url 'ckeditor_browse' %}?type=Images",
            // Allow all HTML including script, iframe
            allowedContent: true,
            extraAllowedContent: 'script[*](*); iframe[*](*); *(*)',
            // Encoding
            entities: false,
            // Remove unused plugins
            removePlugins: 'exportpdf,elementspath',
            // Content CSS — match site font
            contentsCss: [
                'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap',
                'body { font-family: Inter, sans-serif; font-size: 14px; line-height: 1.7; color: #1c1c1e; padding: 12px 16px; }'
            ],
        });
    }

    /* ── Form submit — sync CKEditor → textarea ─────────────────── */
    var form = document.getElementById('create-blog-form');
    if (form) {
        form.addEventListener('submit', function (e) {
            // 1. Sync CKEditor content into textarea
            if (typeof CKEDITOR !== 'undefined' && CKEDITOR.instances['post_description']) {
                CKEDITOR.instances['post_description'].updateElement();
            }

            // 2. Manual validation (textarea has no `required`)
            var desc = document.getElementById('post_description');
            var errEl = document.getElementById('desc-error');
            var content = (desc ? desc.value : '').trim();

            if (!content || content === '') {
                e.preventDefault();
                if (errEl) errEl.classList.remove('hidden');
                return false;
            }
            if (errEl) errEl.classList.add('hidden');

            // 3. Show loading state on button
            var btn  = document.getElementById('create-submit-btn');
            var text = document.getElementById('submit-text');
            if (btn && text) {
                btn.disabled = true;
                text.textContent = 'Publishing…';
            }
        });
    }

    /* ── Boot ───────────────────────────────────────────────────── */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initEditor);
    } else {
        initEditor();
    }

})();
</script>

<script src="{% static 'js/create_blog.js' %}"></script>
