# Techlife Blog - Nginx Configuration Reference
# Deploy this at: /etc/nginx/sites-available/techlife.com.bd
# 
# Installation instructions:
# 1. As root or with sudo, edit/create: /etc/nginx/sites-available/techlife.com.bd
# 2. Copy the configuration below
# 3. Create symlink: ln -s /etc/nginx/sites-available/techlife.com.bd /etc/nginx/sites-enabled/
# 4. Test config: nginx -t
# 5. Reload: systemctl reload nginx
#
# Update /path/to/project/ with your actual Django project path

upstream techlife_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name techlife.com.bd www.techlife.com.bd;
    client_max_body_size 50M;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name techlife.com.bd www.techlife.com.bd;
    
    # SSL certificates (update with your certificate paths)
    ssl_certificate /etc/letsencrypt/live/techlife.com.bd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techlife.com.bd/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss;

    client_max_body_size 50M;

    # === MEDIA FILES CACHE (30 days) ===
    location /media/ {
        alias /path/to/project/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # === STATIC FILES CACHE (1 year - immutable for hash-busted files) ===
    location /static/ {
        alias /path/to/project/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # === DJANGO APPLICATION ===
    location / {
        proxy_pass http://techlife_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # === DENY ACCESS TO SENSITIVE FILES ===
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /db\.sqlite3 {
        deny all;
        access_log off;
        log_not_found off;
    }
}
